<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多国象棋大乱斗</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="start-screen">
        <div class="menu-box">
            <!-- 标题区 -->
            <div class="menu-header">
                <h1>🏯 多国象棋 · 逐鹿</h1>
                <p class="subtitle">天下逐鹿，谁主沉浮</p>
            </div>

            <!-- 模式选择 -->
            <div class="menu-section">
                <label class="section-label">选择模式</label>
                <div class="mode-cards">
                    <div class="mode-card selected" data-mode="chinese" data-board="16">
                        <div class="mode-icon">🐉</div>
                        <div class="mode-name">中国象棋</div>
                        <div class="mode-desc">16×16 大棋盘</div>
                    </div>
                    <div class="mode-card" data-mode="chinese" data-board="10">
                        <div class="mode-icon">🀄</div>
                        <div class="mode-name">中国象棋</div>
                        <div class="mode-desc">10×10 小棋盘</div>
                    </div>
                    <div class="mode-card" data-mode="western" data-board="16">
                        <div class="mode-icon">♛</div>
                        <div class="mode-name">国际象棋</div>
                        <div class="mode-desc">16×16 大棋盘</div>
                    </div>
                    <div class="mode-card" data-mode="western" data-board="10">
                        <div class="mode-icon">♞</div>
                        <div class="mode-name">国际象棋</div>
                        <div class="mode-desc">10×10 小棋盘</div>
                    </div>
                </div>
            </div>

            <!-- 人数选择 -->
            <div class="menu-section">
                <label class="section-label">玩家人数</label>
                <div class="player-selector">
                    <input type="range" id="player-count" min="5" max="8" value="5" oninput="updateLabel()">
                    <span id="player-label">5 人局</span>
                </div>
            </div>

            <!-- 身份牌抽取 -->
            <div class="menu-section">
                <label class="section-label">身份牌抽取 <span class="identity-hint">(点击卡牌查看身份)</span></label>
                <button class="draw-btn" onclick="drawIdentityCards()">🎴 洗牌抽取</button>
                <div id="identity-cards" class="identity-cards-container"></div>
            </div>

            <!-- 开始按钮 -->
            <button class="start-btn" onclick="startGame()">⚔️ 开始征战</button>

            <!-- 规则提示 -->
            <details class="rules-section">
                <summary>📜 游戏规则</summary>
                <div class="rules-content">
                    <p>• 主公(红)位于北方，兵强马壮</p>
                    <p>• 击杀敌方主帅，即可吞并其所有部队</p>
                    <p>• 最后存活的玩家获胜</p>
                </div>
            </details>
        </div>
    </div>

    <div id="game-ui" style="display: none;">
        <div id="info-panel">
            <div id="status">准备就绪</div>
            <div id="timer" style="display: none;"></div>
            <div class="controls-group">
                <button onclick="undoMove()" class="control-btn undo-btn">悔棋</button>
                <button onclick="location.reload()" class="restart-btn">重开</button>
            </div>
        </div>

        <div id="board-container">
            <div class="grid-layer" id="grid"></div>
            <div class="hint-layer" id="hints"></div>
            <div class="pieces-layer" id="pieces"></div>
        </div>
    </div>


    <script src="game.js"></script>
    <script>
        function updateLabel() {
            const count = document.getElementById('player-count').value;
            document.getElementById('player-label').innerText = count + " 人局";
            // 清空已抽取的身份牌
            document.getElementById('identity-cards').innerHTML = '';
        }

        // 模式卡片选择
        document.querySelectorAll('.mode-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
            });
        });

        // 三国杀身份配置
        const IDENTITY_CONFIG = {
            5: { '主公': 1, '忠臣': 1, '内奸': 1, '反贼': 2 },
            6: { '主公': 1, '忠臣': 1, '内奸': 1, '反贼': 3 },
            7: { '主公': 1, '忠臣': 2, '内奸': 1, '反贼': 3 },
            8: { '主公': 1, '忠臣': 2, '内奸': 1, '反贼': 4 }
        };

        // 身份颜色和图标
        const IDENTITY_STYLES = {
            '主公': { color: '#dc2626', bg: '#fef2f2', icon: '👑', border: '#dc2626' },
            '忠臣': { color: '#059669', bg: '#ecfdf5', icon: '🛡️', border: '#059669' },
            '内奸': { color: '#7c3aed', bg: '#f5f3ff', icon: '🎭', border: '#7c3aed' },
            '反贼': { color: '#ea580c', bg: '#fff7ed', icon: '⚔️', border: '#ea580c' }
        };

        let currentIdentities = [];
        let currentFlippedCard = null;

        function drawIdentityCards() {
            const count = parseInt(document.getElementById('player-count').value);
            const config = IDENTITY_CONFIG[count];

            // 生成身份数组
            currentIdentities = [];
            for (const [identity, num] of Object.entries(config)) {
                for (let i = 0; i < num; i++) {
                    currentIdentities.push(identity);
                }
            }

            // 洗牌 (Fisher-Yates)
            for (let i = currentIdentities.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentIdentities[i], currentIdentities[j]] = [currentIdentities[j], currentIdentities[i]];
            }

            // 渲染卡牌
            renderIdentityCards();
        }

        function renderIdentityCards() {
            const container = document.getElementById('identity-cards');
            container.innerHTML = '';

            currentIdentities.forEach((identity, index) => {
                const card = document.createElement('div');
                card.className = 'identity-card';
                card.dataset.index = index;
                card.dataset.identity = identity;

                // 卡牌背面
                const cardBack = document.createElement('div');
                cardBack.className = 'card-face card-back';
                cardBack.innerHTML = `
                    <div class="card-pattern">🎴</div>
                    <div class="card-number">${index + 1}</div>
                `;

                // 卡牌正面
                const style = IDENTITY_STYLES[identity];
                const cardFront = document.createElement('div');
                cardFront.className = 'card-face card-front';
                cardFront.style.backgroundColor = style.bg;
                cardFront.style.borderColor = style.border;
                cardFront.innerHTML = `
                    <div class="card-icon">${style.icon}</div>
                    <div class="card-identity" style="color: ${style.color}">${identity}</div>
                `;

                card.appendChild(cardBack);
                card.appendChild(cardFront);

                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    flipCard(card);
                });

                container.appendChild(card);
            });
        }

        function flipCard(card) {
            // 如果已有翻开的卡牌且不是当前卡牌，先翻回去
            if (currentFlippedCard && currentFlippedCard !== card) {
                currentFlippedCard.classList.remove('flipped');
            }

            // 切换当前卡牌状态
            if (card.classList.contains('flipped')) {
                card.classList.remove('flipped');
                currentFlippedCard = null;
            } else {
                card.classList.add('flipped');
                currentFlippedCard = card;
            }
        }

        // 点击其他地方翻回卡牌
        document.addEventListener('click', (e) => {
            if (currentFlippedCard && !e.target.closest('.identity-card')) {
                currentFlippedCard.classList.remove('flipped');
                currentFlippedCard = null;
            }
        });
    </script>
</body>

</html>
